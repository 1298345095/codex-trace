services:
  codex-trace:
    build:
      context: .
      dockerfile: Dockerfile
    image: codex-trace:latest
    container_name: codex-trace
    restart: unless-stopped
    ports:
      - "${CODEXTRACE_HOST_PORT:-1422}:1422"
    environment:
      CODEXTRACE_HTTP_HOST: 0.0.0.0
      CODEXTRACE_HTTP_PORT: 1422
      CODEXTRACE_STATIC_DIR: /app/dist
    volumes:
      - "${CODEX_SESSIONS_DIR:-${HOME}/.codex/sessions}:/home/app/.codex/sessions:ro"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/1422"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
